# C3 lint baseline (ADR-AEM-WIT-001 §3): errors-only, no style reformat.
# Scope: genuine defects — syntax errors, undefined names, invalid comparisons,
# broken f-strings/escapes. Style/naming/formatting rules are deliberately OFF
# to keep diffs reviewable and Apache attribution intact.

target-version = "py310"
line-length = 200

[lint]
select = [
    "E9",    # syntax errors / io errors
    "F63",   # invalid comparisons (is-literal, ==/!= constants misuse)
    "F7",    # syntax-adjacent (return outside function, break outside loop, ...)
    "F82",   # undefined names
    "F632",  # `is` comparison with str/int literal
    "W605",  # invalid escape sequence (becomes SyntaxError in future Python)
]

[lint.per-file-ignores]
# generated protobuf code is not hand-maintained
"**/*_pb2.py" = ["ALL"]
